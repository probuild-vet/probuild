name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

# Grant explicit permissions so the runner can push the built files to the gh-pages branch.
permissions:
  contents: write
  pages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # ensure full history so the action can create branches/tags if needed
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          # keep existing files on the branch unless overwritten
          keep_files: true
          # allow an empty commit if dist is identical
          allow_empty_commit: true